name: Build and Attach Release Artifact

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version to latest tag
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          VERSION=${VERSION#v}
          npm version $VERSION --no-git-tag-version
          git config user.name "axelra82"
          git config user.email "986301+axelra82@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Build
        run: pnpm build
        env:
          VITE_RANGELOG_URL_PROTOCOL: ${{ secrets.VITE_RANGELOG_URL_PROTOCOL }}
          VITE_RANGELOG_URL_DOMAIN: ${{ secrets.VITE_RANGELOG_URL_DOMAIN }}
          VITE_RANGELOG_URL_SUBDOMAIN: ${{ secrets.VITE_RANGELOG_URL_SUBDOMAIN }}
          VITE_RANGELOG_SERVICE_PROVIDER: ${{ secrets.VITE_RANGELOG_SERVICE_PROVIDER }}

      - name: Create dist artifact
        run: tar -czf dist.tar.gz dist/

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.tar.gz
